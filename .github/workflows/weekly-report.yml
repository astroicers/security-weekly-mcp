name: Weekly Security Report

on:
  # 排程已停用 — 週報「產生」改由 claude.ai 雲端 routine 每週一處理；
  # 發布仍由 deploy-rss.yml 的 on:push 自動觸發。保留 workflow_dispatch 當人工備援。
  workflow_dispatch:  # 手動備援

env:
  UV_CACHE_DIR: /tmp/.uv-cache

permissions:
  contents: write  # 允許 push 到 repo

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 正常執行約 5-8 分鐘，15 分鐘為安全上限
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_reports }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        working-directory: scripts
        run: npm install

      - name: Generate weekly report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: ${{ github.workspace }}
        run: node scripts/claude-weekly-report.mjs

      - name: Check for changes
        id: check_changes
        run: |
          # Check for new reports
          git add output/reports/
          if git diff --staged --quiet; then
            echo "has_reports=false" >> $GITHUB_OUTPUT
            echo "No new reports generated"
          else
            echo "has_reports=true" >> $GITHUB_OUTPUT
            echo "New reports found"
          fi
          git reset HEAD -- output/reports/

          # Check for new pending terms in glossary submodule
          cd packages/glossary
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard pending/)" ]; then
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "No new pending terms or approved terms"
          else
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "New pending/approved terms found"
          fi
          cd ../..

      - name: Generate glossary App token
        id: app_token
        if: steps.check_changes.outputs.has_pending == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GLOSSARY_APP_ID }}
          private-key: ${{ secrets.GLOSSARY_APP_PRIVATE_KEY }}
          owner: astroicers
          repositories: security-glossary-tw

      - name: Commit pending terms to glossary submodule
        if: steps.check_changes.outputs.has_pending == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          cd packages/glossary
          BOT_USER_ID="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git config user.name "${APP_SLUG}[bot]"
          git add pending/ terms/
          git commit -m "terms: add and approve discovered terms from weekly report $(date +%Y-W%V)"
          git remote set-url origin "https://x-access-token:${{ steps.app_token.outputs.token }}@github.com/astroicers/security-glossary-tw.git"
          # If push fails, rollback the local commit so the submodule pointer stays clean
          if ! git push origin HEAD:main; then
            echo "::warning::Failed to push glossary terms — rolling back local commit to avoid stale submodule SHA"
            git reset --hard HEAD~1
          fi
          cd ../..

      - name: Commit and push reports
        if: steps.check_changes.outputs.has_reports == 'true' || steps.check_changes.outputs.has_pending == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add output/reports/ packages/glossary
          git diff --staged --quiet && exit 0
          git commit -m "report: weekly security report $(date +%Y-W%V)

          Generated automatically by Claude Agent SDK

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

  # 部署 RSS 到 glossary 網站
  deploy-rss:
    needs: generate-report
    if: needs.generate-report.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-rss.yml
    secrets: inherit
